<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Infinite Multi-Draw Pro</title>
  <style>
    :root {
      /* Modern Dark Glass Mode */
      --bg-panel: rgba(20, 20, 25, 0.75);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #007aff;
      --accent-hover: #3395ff;
      --chat-mine: #007aff;
      --chat-other: rgba(255, 255, 255, 0.1);
      --panel-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    [data-theme="light"] {
      /* Modern Light Glass Mode */
      --bg-panel: rgba(245, 245, 250, 0.8);
      --text: #1c1c1e;
      --text-muted: rgba(0, 0, 0, 0.5);
      --border: rgba(0, 0, 0, 0.06);
      --accent: #007aff;
      --accent-hover: #0056b3;
      --chat-mine: #007aff;
      --chat-other: rgba(0, 0, 0, 0.05);
      --panel-shadow: 0 20px 40px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      user-select: none; 
      -webkit-user-select: none; 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }
    
    body, html {
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #ffffff;
    }

    #canvas { 
      display: block; 
      width: 100%; 
      height: 100%; 
      touch-action: none; 
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Landscape Mode Enforcer */
    #landscape-warning {
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      background: #09090b; 
      color: white; 
      z-index: 99999;
      align-items: center; 
      justify-content: center; 
      text-align: center; 
      font-size: 1.2rem; 
      font-weight: 500;
      padding: 20px;
    }
    @media (orientation: portrait) { #landscape-warning { display: flex; } }

    /* Premium Floating Panel */
    #floating-panel {
      position: absolute; 
      top: 20px; 
      left: 20px; 
      width: 340px;
      background: var(--bg-panel); 
      backdrop-filter: blur(24px); 
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border); 
      border-radius: 24px; 
      color: var(--text);
      display: flex; 
      flex-direction: column; 
      box-shadow: var(--panel-shadow);
      overflow: hidden; 
      max-height: calc(100vh - 40px);
      z-index: 1000;
      transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1), height 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-radius 0.3s ease;
    }
    
    /* Minimized Micro Action Circle */
    #floating-panel.minimized { 
      width: 56px; 
      height: 56px; 
      border-radius: 28px;
    }
    #floating-panel.minimized .panel-content { 
      display: none; 
    }
    #floating-panel.minimized #drag-handle {
      border: none;
      background: transparent;
      width: 100%;
      height: 100%;
      padding: 0;
      justify-content: center;
    }
    #floating-panel.minimized #drag-handle .handle-bar,
    #floating-panel.minimized #drag-handle #theme-toggle {
      display: none;
    }
    #floating-panel.minimized #minimize-toggle {
      width: 100%;
      height: 100%;
      margin: 0;
      font-size: 20px;
    }

    /* Drag Handle Frame */
    #drag-handle {
      height: 48px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      padding: 0 16px; 
      cursor: grab; 
      background: rgba(0,0,0,0.02); 
      border-bottom: 1px solid var(--border);
    }
    #drag-handle:active { cursor: grabbing; }
    .handle-bar { width: 36px; height: 5px; background: var(--text); border-radius: 3px; opacity: 0.2; }
    .btn-icon { background: none; border: none; color: var(--text); font-size: 16px; padding: 8px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .btn-icon:hover { background: rgba(255,255,255,0.1); }

    /* Layout Panel Body */
    .panel-content { padding: 20px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; flex: 1; }

    /* Control Structuring */
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* Modern Slider Layouts */
    input[type=range] { 
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: var(--border); outline: none; accent-color: var(--accent);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text); cursor: pointer; border: 2px solid var(--accent);
    }

    /* Mode Navigation Segment */
    .mode-segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.08);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .segment-btn {
      padding: 8px;
      background: none;
      border: none;
      color: var(--text);
      font-weight: 600;
      font-size: 0.85rem;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .segment-btn.active {
      background: var(--text);
      color: var(--bg-panel);
    }
    
    /* Grid Structuring */
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    
    .brush-btn { 
      padding: 10px 0; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .brush-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .color-btn { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
    .color-btn.active { border-color: var(--text); transform: scale(1.1); box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    #color-picker { width: 100%; aspect-ratio: 1; border: none; border-radius: 50%; cursor: pointer; padding: 0; background: none; }
    
    /* Interface Utility Buttons */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-btn { 
      padding: 11px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.8rem; cursor: pointer;
      background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); transition: background 0.2s;
    }
    .action-btn:active { background: rgba(255,255,255,0.15); }
    .action-btn.danger { background: rgba(255, 59, 48, 0.15); color: #ff453a; border-color: rgba(255, 59, 48, 0.2); }
    .action-btn.danger:active { background: rgba(255, 59, 48, 0.3); }

    /* Real-Time Database Messaging Hub */
    #chat-box { 
      flex: 1; min-height: 110px; max-height: 150px; border: 1px solid var(--border); border-radius: 14px; 
      padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.04); 
    }
    .chat-msg { padding: 7px 12px; border-radius: 14px; font-size: 0.8rem; max-width: 85%; word-wrap: break-word; line-height: 1.3; }
    .chat-msg.mine { align-self: flex-end; background: var(--chat-mine); color: white; border-bottom-right-radius: 2px; }
    .chat-msg.other { align-self: flex-start; background: var(--chat-other); color: var(--text); border-bottom-left-radius: 2px; }
    
    .chat-input-row { display: flex; gap: 6px; }
    #chat-input { 
      flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); 
      background: rgba(0,0,0,0.06); color: var(--text); outline: none; font-size: 0.85rem;
    }
    #send-chat { padding: 0 16px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    #send-chat:hover { background: var(--accent-hover); }

  </style>
</head>
<body>

  <div id="landscape-warning">Please rotate your device to Landscape Mode.</div>
  
  <canvas id="canvas"></canvas>

  <div id="floating-panel">
    <div id="drag-handle">
      <button id="theme-toggle" class="btn-icon">☀️</button>
      <div class="handle-bar"></div>
      <button id="minimize-toggle" class="btn-icon">🔽</button>
    </div>
    
    <div class="panel-content">
      <div class="mode-segment">
        <button class="segment-btn active" id="mode-draw">✏️ Draw</button>
        <button class="segment-btn" id="mode-move">🖐️ Move</button>
      </div>

      <div class="control-group">
        <label>Brushes</label>
        <div class="grid-5">
          <button class="brush-btn active" data-brush="solid">Solid</button>
          <button class="brush-btn" data-brush="marker">Marker</button>
          <button class="brush-btn" data-brush="soft">Soft</button>
          <button class="brush-btn" data-brush="neon">Neon</button>
          <button class="brush-btn" data-brush="eraser">Eraser</button>
        </div>
      </div>

      <div class="control-group">
        <label>Thickness: <span id="thick-val">10</span>px</label>
        <input type="range" id="thickness" min="1" max="178" value="10">
      </div>
      <div class="control-group" id="opacity-container">
        <label>Opacity: <span id="opac-val">100</span>%</label>
        <input type="range" id="opacity" min="0.01" max="1" step="0.01" value="1">
      </div>

      <div class="control-group" id="color-container">
        <label>Colors</label>
        <div class="grid-5" id="colors">
          <div class="color-btn active" style="background:#000000" data-color="#000000"></div>
          <div class="color-btn" style="background:#ff3b30" data-color="#ff3b30"></div>
          <div class="color-btn" style="background:#ff9500" data-color="#ff9500"></div>
          <div class="color-btn" style="background:#ffcc00" data-color="#ffcc00"></div>
          <div class="color-btn" style="background:#4cd964" data-color="#4cd964"></div>
          <div class="color-btn" style="background:#5ac8fa" data-color="#5ac8fa"></div>
          <div class="color-btn" style="background:#007aff" data-color="#007aff"></div>
          <div class="color-btn" style="background:#5856d6" data-color="#5856d6"></div>
          <div class="color-btn" style="background:#ffffff; border: 1px solid var(--border);" data-color="#ffffff"></div>
          <input type="color" id="color-picker" value="#ff00ff">
        </div>
      </div>

      <div class="action-grid">
        <button class="action-btn" id="btn-recenter">Re-center</button>
        <button class="action-btn" id="btn-undo">Undo Last</button>
        <button class="action-btn" id="btn-save">Save Image</button>
        <button class="action-btn danger" id="btn-clear">Clear All</button>
      </div>

      <div class="control-group">
        <label>Live Chat</label>
        <div id="chat-box"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
          <button id="send-chat">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, remove, set, onChildRemoved, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM1jZYl7qQzYdeD6oJIljyFBHALmq8p3c",
      authDomain: "multidrawing-bab47.firebaseapp.com",
      databaseURL: "https://multidrawing-bab47-default-rtdb.firebaseio.com",
      projectId: "multidrawing-bab47",
      storageBucket: "multidrawing-bab47.firebasestorage.app",
      messagingSenderId: "13446580110",
      appId: "1:13446580110:web:54fa80be0018aed00546df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const strokesRef = ref(db, 'strokes');
    const chatRef = ref(db, 'chat');

    const myUid = 'user_' + Math.random().toString(36).substr(2, 9);

    // Context Processing Configurations
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let width = window.innerWidth;
    let height = window.innerHeight;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      drawAll();
    }
    window.addEventListener('resize', resize);

    // Transformation Vectors
    let camera = { x: 0, y: 0, scale: 1 };
    let currentMode = 'draw'; // 'draw' or 'move'
    let tool = { color: '#000000', size: 10, opacity: 1, brush: 'solid' };
    
    let isDrawing = false;
    let isPanning = false;
    let currentStrokeId = null;
    let localStrokes = {}; 
    let strokeOrder = []; 

    // Touch Event Variables
    let initialPinchDistance = null;
    let initialCamera = null;
    let activeTouches = {};
    let initialPanCenter = null;

    function resetCamera() {
      camera = { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 };
      drawAll();
    }

    function screenToWorld(x, y) {
      return { x: (x - camera.x) / camera.scale, y: (y - camera.y) / camera.scale };
    }

    function getTouchCenter(touches) {
      let sumX = 0, sumY = 0;
      touches.forEach(t => { sumX += t.clientX; sumY += t.clientY; });
      return { x: sumX / touches.length, y: sumY / touches.length };
    }

    // Engine Render Architecture
    function applyBrushStyles(ctxToUse, brushType, color, size, opacity) {
      ctxToUse.lineCap = 'round';
      ctxToUse.lineJoin = 'round';
      ctxToUse.lineWidth = size;
      ctxToUse.globalCompositeOperation = 'source-over';
      ctxToUse.shadowBlur = 0;
      ctxToUse.shadowColor = 'transparent';

      if (brushType === 'eraser') {
        // Since background color is locked to pure white, drawing white acts as an infinite-space eraser
        ctxToUse.strokeStyle = '#ffffff';
        return;
      }

      let r=0, g=0, b=0;
      if(color.startsWith('#')) {
        r = parseInt(color.slice(1,3), 16);
        g = parseInt(color.slice(3,5), 16);
        b = parseInt(color.slice(5,7), 16);
      }
      
      ctxToUse.strokeStyle = `rgba(${r},${g},${b},${opacity})`;

      if(brushType === 'soft') {
        ctxToUse.shadowBlur = size;
        ctxToUse.shadowColor = color;
      } else if (brushType === 'neon') {
        ctxToUse.shadowBlur = size * 1.4;
        ctxToUse.shadowColor = color;
        ctxToUse.strokeStyle = `rgba(255,255,255,${opacity})`;
      } else if (brushType === 'marker') {
        ctxToUse.globalCompositeOperation = 'multiply';
      }
    }

    function renderStroke(ctxToUse, stroke) {
      if(!stroke.pts || stroke.pts.length === 0) return;
      ctxToUse.save();
      
      applyBrushStyles(ctxToUse, stroke.brush, stroke.color, stroke.size, stroke.opacity);
      
      ctxToUse.beginPath();
      let pts = stroke.pts.split(';');
      for(let i=0; i<pts.length; i++) {
        let coords = pts[i].split(',');
        if(coords.length < 2) continue;
        let px = parseFloat(coords[0]);
        let py = parseFloat(coords[1]);
        if(i===0) ctxToUse.moveTo(px, py);
        else ctxToUse.lineTo(px, py);
      }
      ctxToUse.stroke();
      ctxToUse.restore();
    }

    function drawAll() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.translate(camera.x, camera.y);
      ctx.scale(camera.scale, camera.scale);

      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(ctx, localStrokes[id]);
      }
      ctx.restore();
    }

    // Touch Interaction Layer
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for(let i=0; i<e.changedTouches.length; i++) {
        activeTouches[e.changedTouches[i].identifier] = e.changedTouches[i];
      }
      let touches = Object.values(activeTouches);

      // Force Panning if 3 fingers down or if Explicit Move Mode is on
      if (touches.length === 3 || (currentMode === 'move' && touches.length === 1)) {
        isDrawing = false;
        isPanning = true;
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
      } 
      // 2-Finger Zoom Gesture
      else if (touches.length === 2) {
        isDrawing = false;
        isPanning = true;
        let dx = touches[0].clientX - touches[1].clientX;
        let dy = touches[0].clientY - touches[1].clientY;
        initialPinchDistance = Math.sqrt(dx*dx + dy*dy);
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
      } 
      // Single Finger Canvas Interaction (Draw Mode Only)
      else if (touches.length === 1 && currentMode === 'draw') {
        isDrawing = true;
        isPanning = false;
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);
        let newStrokeRef = push(strokesRef);
        currentStrokeId = newStrokeRef.key;
        
        let newStroke = {
          uid: myUid, color: tool.color, size: tool.size, opacity: tool.opacity, brush: tool.brush, pts: `${pt.x.toFixed(1)},${pt.y.toFixed(1)}`
        };
        
        localStrokes[currentStrokeId] = newStroke;
        strokeOrder.push(currentStrokeId);
        set(newStrokeRef, newStroke);
      }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for(let i=0; i<e.changedTouches.length; i++) {
        if(activeTouches[e.changedTouches[i].identifier]) {
          activeTouches[e.changedTouches[i].identifier] = e.changedTouches[i];
        }
      }
      let touches = Object.values(activeTouches);

      if (isDrawing && touches.length === 1 && currentStrokeId) {
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);
        let stroke = localStrokes[currentStrokeId];
        stroke.pts += `;${pt.x.toFixed(1)},${pt.y.toFixed(1)}`;
        
        set(ref(db, `strokes/${currentStrokeId}/pts`), stroke.pts);
        drawAll(); 
      }
      else if (isPanning && initialPanCenter) {
        let currentCenter = getTouchCenter(touches);
        let deltaX = currentCenter.x - initialPanCenter.x;
        let deltaY = currentCenter.y - initialPanCenter.y;

        if (touches.length === 2 && initialPinchDistance) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          let dist = Math.sqrt(dx*dx + dy*dy);
          
          let scaleDiff = dist / initialPinchDistance;
          let newScale = initialCamera.scale * scaleDiff;

          // Precise pin-to-center scaling tracking logic
          let worldX = (currentCenter.x - initialCamera.x) / initialCamera.scale;
          let worldY = (currentCenter.y - initialCamera.y) / initialCamera.scale;

          camera.scale = newScale;
          camera.x = currentCenter.x - worldX * camera.scale;
          camera.y = currentCenter.y - worldY * camera.scale;
        } else {
          // Pure Pan Tracking (Move Mode Single Finger / 3-Finger Gesture)
          camera.x = initialCamera.x + deltaX;
          camera.y = initialCamera.y + deltaY;
        }
        drawAll();
      }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for(let i=0; i<e.changedTouches.length; i++) {
        delete activeTouches[e.changedTouches[i].identifier];
      }
      let touches = Object.values(activeTouches);
      
      if (touches.length === 0) {
        isDrawing = false;
        isPanning = false;
        currentStrokeId = null;
        initialPinchDistance = null;
        initialPanCenter = null;
      } else {
        // Reset anchor maps to prevent visual canvas jumping on multi-touch drops
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
        if (touches.length !== 2) initialPinchDistance = null;
      }
    });

    // Cloud Database Real-time Synchronizations
    onChildAdded(strokesRef, (snapshot) => {
      let id = snapshot.key;
      if(!localStrokes[id]) {
        localStrokes[id] = snapshot.val();
        strokeOrder.push(id);
        drawAll();
      }
    });

    onChildChanged(strokesRef, (snapshot) => {
      let id = snapshot.key;
      if(localStrokes[id] && id !== currentStrokeId) {
        localStrokes[id].pts = snapshot.val().pts;
        drawAll();
      }
    });

    onChildRemoved(strokesRef, (snapshot) => {
      let id = snapshot.key;
      delete localStrokes[id];
      strokeOrder = strokeOrder.filter(sId => sId !== id);
      drawAll();
    });

    onValue(ref(db, 'strokes'), (snap) => {
      if(!snap.exists()) {
        localStrokes = {};
        strokeOrder = [];
        drawAll();
      }
    });


    // ==== INTERFACE INTERACTIVE UX DEPLOYMENT ====

    // Panel Draggable Module Setup
    const panel = document.getElementById('floating-panel');
    const handle = document.getElementById('drag-handle');
    let isDraggingPanel = false, panelOffsetX, panelOffsetY;

    handle.addEventListener('touchstart', (e) => {
      if(e.target.closest('button')) return;
      isDraggingPanel = true;
      let touch = e.touches[0];
      let rect = panel.getBoundingClientRect();
      panelOffsetX = touch.clientX - rect.left;
      panelOffsetY = touch.clientY - rect.top;
    });
    
    window.addEventListener('touchmove', (e) => {
      if(isDraggingPanel) {
        let touch = e.touches[0];
        let x = touch.clientX - panelOffsetX;
        let y = touch.clientY - panelOffsetY;
        x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
        y = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, y));
        panel.style.left = x + 'px';
        panel.style.top = y + 'px';
      }
    }, { passive: true });
    window.addEventListener('touchend', () => isDraggingPanel = false);

    // Minimize System State Transition
    document.getElementById('minimize-toggle').onclick = () => {
      panel.classList.toggle('minimized');
      document.getElementById('minimize-toggle').innerText = panel.classList.contains('minimized') ? '展开' : '🔽';
      if(panel.classList.contains('minimized')) {
        document.getElementById('minimize-toggle').innerHTML = `<span style="font-size:12px; font-weight:bold;">MENU</span>`;
      } else {
        document.getElementById('minimize-toggle').innerText = '🔽';
      }
    };

    // Style Schema Theme Transitions
    document.getElementById('theme-toggle').onclick = () => {
      let current = document.documentElement.getAttribute('data-theme');
      let next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      document.getElementById('theme-toggle').innerText = next === 'light' ? '🌙' : '☀️';
    };

    // Mode Controller Configurations
    const modeDrawBtn = document.getElementById('mode-draw');
    const modeMoveBtn = document.getElementById('mode-move');
    
    modeDrawBtn.onclick = () => {
      currentMode = 'draw';
      modeDrawBtn.classList.add('active');
      modeMoveBtn.classList.remove('active');
    };
    modeMoveBtn.onclick = () => {
      currentMode = 'move';
      modeMoveBtn.classList.add('active');
      modeDrawBtn.classList.remove('active');
    };

    // Range Controllers
    document.getElementById('thickness').oninput = (e) => {
      tool.size = parseInt(e.target.value);
      document.getElementById('thick-val').innerText = tool.size;
    };
    
    document.getElementById('opacity').oninput = (e) => {
      tool.opacity = parseFloat(e.target.value);
      document.getElementById('opac-val').innerText = Math.round(tool.opacity * 100);
    };

    // Brush Variant Selection Logic
    document.querySelectorAll('.brush-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool.brush = btn.getAttribute('data-brush');

        // Hide structural layers unneeded for functional erasures
        if(tool.brush === 'eraser') {
          document.getElementById('color-container').style.opacity = '0.3';
          document.getElementById('color-container').style.pointerEvents = 'none';
          document.getElementById('opacity-container').style.opacity = '0.3';
          document.getElementById('opacity-container').style.pointerEvents = 'none';
        } else {
          document.getElementById('color-container').style.opacity = '1';
          document.getElementById('color-container').style.pointerEvents = 'auto';
          document.getElementById('opacity-container').style.opacity = '1';
          document.getElementById('opacity-container').style.pointerEvents = 'auto';
        }
      };
    });

    // Color Pick Systems
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool.color = btn.getAttribute('data-color');
      };
    });

    document.getElementById('color-picker').oninput = (e) => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      tool.color = e.target.value;
    };

    // Functional Operational Action Commands
    document.getElementById('btn-recenter').onclick = resetCamera;
    
    document.getElementById('btn-undo').onclick = async () => {
      for(let i = strokeOrder.length - 1; i >= 0; i--) {
        let id = strokeOrder[i];
        if(localStrokes[id] && localStrokes[id].uid === myUid) {
          await remove(ref(db, `strokes/${id}`));
          break;
        }
      }
    };

    document.getElementById('btn-clear').onclick = () => {
      if(confirm('Clear the canvas landscape for everyone?')) {
        remove(strokesRef);
      }
    };

    document.getElementById('btn-save').onclick = () => {
      if(strokeOrder.length === 0) return alert('Canvas is empty!');
      
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      
      for(let id of strokeOrder) {
        let stroke = localStrokes[id];
        if(!stroke.pts) continue;
        let pts = stroke.pts.split(';');
        for(let pt of pts) {
          let [x,y] = pt.split(',').map(Number);
          if(x < minX) minX = x;
          if(x > maxX) maxX = x;
          if(y < minY) minY = y;
          if(y > maxY) maxY = y;
        }
      }

      let pad = 100;
      minX -= pad; minY -= pad; maxX += pad; maxY += pad;
      
      let offCanvas = document.createElement('canvas');
      offCanvas.width = maxX - minX;;
      offCanvas.height = maxY - minY;
      let offCtx = offCanvas.getContext('2d');
      offCtx.fillStyle = '#ffffff';
      offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
      offCtx.translate(-minX, -minY);
      
      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(offCtx, localStrokes[id]);
      }

      let link = document.createElement('a');
      link.download = 'shared-infinite-canvas.png';
      link.href = offCanvas.toDataURL('image/png');
      link.click();
    };

    // Chat Protocol Deployment
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    
    function sendMsg() {
      let text = chatInput.value.trim();
      if(text) {
        push(chatRef, { uid: myUid, text: text, time: Date.now() });
        chatInput.value = '';
      }
    }
    document.getElementById('send-chat').onclick = sendMsg;
    chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    onChildAdded(chatRef, (snapshot) => {
      let msg = snapshot.val();
      let div = document.createElement('div');
      div.className = 'chat-msg ' + (msg.uid === myUid ? 'mine' : 'other');
      div.innerText = msg.text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Immediate Boot Vector Executions (Fixes the initial loading invisibility error)
    resize();
    resetCamera();

  </script>
</body>
</html>
