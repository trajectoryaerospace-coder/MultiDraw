<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Infinite Multi-Draw Pro</title>
  <style>
    :root {
      --bg-panel: rgba(20, 20, 25, 0.78);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #007aff;
      --accent-hover: #3395ff;
      --chat-mine: #007aff;
      --chat-other: rgba(255, 255, 255, 0.1);
      --panel-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      --dot-green: #30d158;
      --dot-red: #ff453a;
    }
    [data-theme="light"] {
      --bg-panel: rgba(245, 245, 250, 0.85);
      --text: #1c1c1e;
      --text-muted: rgba(0, 0, 0, 0.5);
      --border: rgba(0, 0, 0, 0.06);
      --accent: #007aff;
      --accent-hover: #0056b3;
      --chat-mine: #007aff;
      --chat-other: rgba(0, 0, 0, 0.05);
      --panel-shadow: 0 20px 40px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
      --dot-green: #34c759;
      --dot-red: #ff3b30;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }
 
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #09090b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s ease;
    }
    .intro-title {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-align: center;
      animation: pulseGlow 2s infinite ease-in-out;
    }
    .intro-subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.98); opacity: 0.85; text-shadow: 0 0 0px rgba(0,122,255,0); }
      50% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 20px rgba(0,122,255,0.6); }
    }
    #landscape-warning {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #09090b; color: white; z-index: 99999;
      align-items: center; justify-content: center; text-align: center;
      font-size: 1.2rem; font-weight: 500; padding: 20px;
    }
    @media (orientation: portrait) { #landscape-warning { display: flex; } }

    #floating-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 340px;
      background: var(--bg-panel);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      box-shadow: var(--panel-shadow);
      overflow: hidden;
      max-height: calc(100vh - 40px);
      z-index: 1000;
    }
    #floating-panel.minimized {
      width: 56px;
      height: 56px;
      border-radius: 28px;
    }
    #floating-panel.minimized .panel-content {
      display: none;
    }
    #noti-dot {
      position: absolute;
      top: 13px;
      left: 48px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--dot-green);
      z-index: 1005;
      box-shadow: 0 0 8px var(--dot-green);
    }
    #noti-dot.unread {
      background-color: var(--dot-red);
      box-shadow: 0 0 10px var(--dot-red);
    }
    #drag-handle {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      cursor: grab;
      background: rgba(0,0,0,0.02);
      border-bottom: 1px solid var(--border);
    }
    #drag-handle:active { cursor: grabbing; }
    .handle-bar { width: 36px; height: 5px; background: var(--text); border-radius: 3px; opacity: 0.2; }
    .btn-icon { background: none; border: none; color: var(--text); font-size: 16px; padding: 8px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .btn-icon:hover { background: rgba(255,255,255,0.1); }
    .panel-content { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; flex: 1; }
    .control-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input[type=range] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: var(--border); outline: none; accent-color: var(--accent);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text); cursor: pointer; border: 2px solid var(--accent);
    }
    .mode-segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.08);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .segment-btn {
      padding: 8px; background: none; border: none; color: var(--text); font-weight: 600; font-size: 0.85rem; border-radius: 9px; cursor: pointer;
    }
    .segment-btn.active {
      background: var(--text); color: var(--bg-panel);
    }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .brush-btn {
      padding: 10px 0; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.75rem; font-weight: 500; cursor: pointer;
    }
    .brush-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .color-btn { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
    .color-btn.active { border-color: var(--text); transform: scale(1.1); box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    #color-picker { width: 100%; aspect-ratio: 1; border: none; border-radius: 50%; cursor: pointer; padding: 0; background: none; }
    .image-control-box {
      background: rgba(0,0,0,0.04); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .action-btn {
      padding: 11px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.8rem; cursor: pointer;
      background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border);
    }
    .action-btn.danger { background: rgba(255, 59, 48, 0.15); color: #ff453a; border-color: rgba(255, 59, 48, 0.2); }
    .action-btn.active-toggle { background: #ff9500; color: white; border-color: #ff9500; }
    #chat-box {
      flex: 1; min-height: 110px; max-height: 160px; border: 1px solid var(--border); border-radius: 14px;
      padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.04);
    }
    .chat-msg { padding: 7px 12px; border-radius: 14px; font-size: 0.8rem; max-width: 85%; word-wrap: break-word; line-height: 1.3; }
    .chat-msg.mine { align-self: flex-end; background: var(--chat-mine); color: white; border-bottom-right-radius: 2px; }
    .chat-msg.other { align-self: flex-start; background: var(--chat-other); color: var(--text); border-bottom-left-radius: 2px; }
    .chat-input-row { display: flex; gap: 6px; }
    #chat-input {
      flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.06); color: var(--text); outline: none; font-size: 0.85rem;
    }
    #send-chat { padding: 0 16px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="intro-title">Multidraw</div>
    <div class="intro-subtitle">For amazingngn Zann</div>
  </div>
  <div id="landscape-warning">Please rotate your device to Landscape Mode.</div>
  <canvas id="canvas"></canvas>
  <div id="floating-panel">
    <div id="noti-dot"></div>
    <div id="drag-handle">
      <button id="theme-toggle" class="btn-icon">☀️</button>
      <div class="handle-bar"></div>
      <button id="minimize-toggle" class="btn-icon">🔽</button>
    </div>
 
    <div class="panel-content">
      <!-- Chat at top -->
      <div class="control-group">
        <label>Live Synchronized Chat</label>
        <div id="chat-box"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
          <button id="send-chat">Send</button>
        </div>
      </div>

      <div class="mode-segment">
        <button class="segment-btn active" id="mode-draw">✏️ Draw</button>
        <button class="segment-btn" id="mode-move">🖐️ Move Workspace</button>
      </div>

      <div class="control-group">
        <label>Brushes & Tools</label>
        <div class="grid-5">
          <button class="brush-btn active" data-tool="solid">Solid</button>
          <button class="brush-btn" data-tool="marker">Marker</button>
          <button class="brush-btn" data-tool="soft">Soft</button>
          <button class="brush-btn" data-tool="neon">Neon</button>
          <button class="brush-btn" data-tool="eraser">Eraser</button>
          <button class="brush-btn" data-tool="bucket">🪣 Bucket</button>
          <button class="brush-btn" data-tool="circle">○ Circle</button>
          <button class="brush-btn" data-tool="square">⬛ Square</button>
        </div>
      </div>

      <div class="control-group">
        <label>Thickness: <span id="thick-val">10</span>px</label>
        <input type="range" id="thickness" min="1" max="178" value="10">
      </div>
      <div class="control-group" id="opacity-container">
        <label>Opacity: <span id="opac-val">100</span>%</label>
        <input type="range" id="opacity" min="0.01" max="1" step="0.01" value="1">
      </div>
      <div class="control-group" id="color-container">
        <label>Colors</label>
        <div class="grid-5" id="colors">
          <div class="color-btn active" style="background:#000000" data-color="#000000"></div>
          <div class="color-btn" style="background:#ff3b30" data-color="#ff3b30"></div>
          <div class="color-btn" style="background:#ff9500" data-color="#ff9500"></div>
          <div class="color-btn" style="background:#ffcc00" data-color="#ffcc00"></div>
          <div class="color-btn" style="background:#4cd964" data-color="#4cd964"></div>
          <div class="color-btn" style="background:#5ac8fa" data-color="#5ac8fa"></div>
          <div class="color-btn" style="background:#007aff" data-color="#007aff"></div>
          <div class="color-btn" style="background:#5856d6" data-color="#5856d6"></div>
          <div class="color-btn" style="background:#ffffff; border: 1px solid var(--border);" data-color="#ffffff"></div>
          <input type="color" id="color-picker" value="#ff00ff">
        </div>
      </div>

      <div class="control-group">
        <label>Canvas Image Engine</label>
        <div class="image-control-box">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
            <button class="action-btn" id="btn-upload-trigger">📷 Add Image</button>
            <button class="action-btn danger" id="btn-remove-image">🗑️ Remove Image</button>
          </div>
          <input type="file" id="image-uploader" accept="image/*" style="display: none;">
          <div class="control-group">
            <label>Image Scale: <span id="scale-val">100</span>%</label>
            <input type="range" id="image-scale-slider" min="0" max="3" step="0.02" value="1">
          </div>
          <button class="action-btn" id="btn-toggle-img-move">🔒 Move Image Mode: Off</button>
        </div>
      </div>

      <div class="action-grid">
        <button class="action-btn" id="btn-recenter">Re-center</button>
        <button class="action-btn" id="btn-undo">Undo Last</button>
        <button class="action-btn" id="btn-toggle-nametags">🏷️ Tags: On</button>
        <button class="action-btn" id="btn-save">Save Image</button>
        <button class="action-btn danger" id="btn-clear" style="grid-column: span 2;">Clear All Canvas</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, remove, set, onChildRemoved, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDM1jZYl7qQzYdeD6oJIljyFBHALmq8p3c",
      authDomain: "multidrawing-bab47.firebaseapp.com",
      databaseURL: "https://multidrawing-bab47-default-rtdb.firebaseio.com",
      projectId: "multidrawing-bab47",
      storageBucket: "multidrawing-bab47.firebasestorage.app",
      messagingSenderId: "13446580110",
      appId: "1:13446580110:web:54fa80be0018aed00546df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const strokesRef = ref(db, 'strokes');
    const chatRef = ref(db, 'chat');
    const imageRef = ref(db, 'sharedImage');

    const myUid = 'user_' + Math.random().toString(36).substr(2, 9);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });

    let width = window.innerWidth;
    let height = window.innerHeight;

    let camera = { x: width / 2, y: height / 2, scale: 1 };
    let currentMode = 'draw';
    let isMovingImageMode = false;
    let showNameTags = true;
    let tool = { type: 'solid', color: '#000000', size: 10, opacity: 1 };

    let isDrawing = false;
    let isPanning = false;
    let currentStrokeId = null;
    let localStrokes = {};
    let strokeOrder = [];

    let canvasImage = { element: null, src: null, x: 0, y: 0, scale: 1 };

    let activeTouches = {};
    let initialPinchDistance = null;
    let initialCamera = null;
    let initialImagePos = null;
    let initialPanCenter = null;
    let previewShape = null;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      drawAll();
    }
    window.addEventListener('resize', resize);

    function getCanvasRect() {
      return canvas.getBoundingClientRect();
    }

    // Improved coordinate system for iPhone Chrome
    function screenToWorld(screenX, screenY) {
      const rect = getCanvasRect();
      // Use clientX/Y relative to canvas + small correction for mobile browsers
      let canvasX = screenX - rect.left;
      let canvasY = screenY - rect.top;
      
      // Extra fix for iOS Chrome touch offset
      if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
        canvasX -= 2; // small horizontal correction
      }
      
      return { 
        x: (canvasX - camera.x) / camera.scale, 
        y: (canvasY - camera.y) / camera.scale 
      };
    }

    function getTouchCenter(touches) {
      let sumX = 0, sumY = 0;
      touches.forEach(t => { sumX += t.clientX; sumY += t.clientY; });
      return { x: sumX / touches.length, y: sumY / touches.length };
    }

    function applyBrushStyles(ctxToUse, brushType, color, size, opacity) {
      ctxToUse.lineCap = 'round';
      ctxToUse.lineJoin = 'round';
      ctxToUse.lineWidth = size;
      ctxToUse.globalCompositeOperation = 'source-over';
      ctxToUse.shadowBlur = 0;
      ctxToUse.shadowColor = 'transparent';
      if (brushType === 'eraser') {
        ctxToUse.strokeStyle = '#ffffff';
        return;
      }
      let r=0, g=0, b=0;
      if(color.startsWith('#')) {
        r = parseInt(color.slice(1,3), 16);
        g = parseInt(color.slice(3,5), 16);
        b = parseInt(color.slice(5,7), 16);
      }
      ctxToUse.strokeStyle = `rgba(${r},${g},${b},${opacity})`;
      if(brushType === 'soft') {
        ctxToUse.shadowBlur = size;
        ctxToUse.shadowColor = color;
      } else if (brushType === 'neon') {
        ctxToUse.shadowBlur = size * 1.4;
        ctxToUse.shadowColor = color;
        ctxToUse.strokeStyle = `rgba(255,255,255,${opacity})`;
      } else if (brushType === 'marker') {
        ctxToUse.globalCompositeOperation = 'multiply';
      }
    }

    function renderStroke(ctxToUse, stroke) {
      if(!stroke.pts || stroke.pts.length === 0) return;
      ctxToUse.save();
      applyBrushStyles(ctxToUse, stroke.brush || stroke.type, stroke.color, stroke.size, stroke.opacity);
      ctxToUse.beginPath();
      let pts = stroke.pts.split(';');
      for(let i=0; i<pts.length; i++) {
        let coords = pts[i].split(',');
        if(coords.length < 2) continue;
        let px = parseFloat(coords[0]);
        let py = parseFloat(coords[1]);
        if(i===0) ctxToUse.moveTo(px, py);
        else ctxToUse.lineTo(px, py);
      }
      ctxToUse.stroke();
      ctxToUse.restore();
    }

    function drawAll() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.save();
      ctx.translate(camera.x, camera.y);
      ctx.scale(camera.scale, camera.scale);

      if (canvasImage.element) {
        ctx.save();
        ctx.translate(canvasImage.x, canvasImage.y);
        ctx.scale(canvasImage.scale, canvasImage.scale);
        try { ctx.drawImage(canvasImage.element, -canvasImage.element.width / 2, -canvasImage.element.height / 2); } catch(e) {}
        ctx.restore();
      }

      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(ctx, localStrokes[id]);
      }

      if (previewShape) {
        ctx.save();
        applyBrushStyles(ctx, previewShape.tool, tool.color, tool.size, tool.opacity);
        ctx.beginPath();
        let pts = previewShape.pts.split(';');
        for(let i=0; i<pts.length; i++) {
          let coords = pts[i].split(',');
          let px = parseFloat(coords[0]);
          let py = parseFloat(coords[1]);
          if(i===0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore();
    }

    // Generate circle points
    function generateCirclePoints(cx, cy, radius, segments = 64) {
      let pts = [];
      for(let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        pts.push(`${(cx + Math.cos(angle) * radius).toFixed(1)},${(cy + Math.sin(angle) * radius).toFixed(1)}`);
      }
      return pts.join(';');
    }

    function generateSquarePoints(x1, y1, x2, y2) {
      const minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
      const minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
      const side = Math.max(maxX - minX, maxY - minY);
      let pts = [];
      pts.push(`${minX.toFixed(1)},${minY.toFixed(1)}`);
      pts.push(`${(minX + side).toFixed(1)},${minY.toFixed(1)}`);
      pts.push(`${(minX + side).toFixed(1)},${(minY + side).toFixed(1)}`);
      pts.push(`${minX.toFixed(1)},${(minY + side).toFixed(1)}`);
      pts.push(`${minX.toFixed(1)},${minY.toFixed(1)}`);
      return pts.join(';');
    }

    // Flood fill
    function floodFill(startX, startY) {
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      const target = hexToRgb(tool.color);
      const startIdx = (Math.floor(startY) * width + Math.floor(startX)) * 4;
      const startR = data[startIdx], startG = data[startIdx+1], startB = data[startIdx+2];

      const stack = [[Math.floor(startX), Math.floor(startY)]];
      while (stack.length > 0) {
        const [x, y] = stack.pop();
        if (x < 0 || x >= width || y < 0 || y >= height) continue;
        const idx = (y * width + x) * 4;
        if (data[idx] === startR && data[idx+1] === startG && data[idx+2] === startB) {
          data[idx] = target.r;
          data[idx+1] = target.g;
          data[idx+2] = target.b;
          data[idx+3] = 255;
          stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
        }
      }
      ctx.putImageData(imageData, 0, 0);
      drawAll();
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1,3), 16),
        g: parseInt(hex.slice(3,5), 16),
        b: parseInt(hex.slice(5,7), 16)
      };
    }

    // Touch Start
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for(let touch of e.changedTouches) {
        activeTouches[touch.identifier] = touch;
      }
      let touches = Object.values(activeTouches);

      if (isMovingImageMode && canvasImage.element && touches.length === 1) {
        initialPanCenter = { x: touches[0].clientX, y: touches[0].clientY };
        initialImagePos = { x: canvasImage.x, y: canvasImage.y };
      } else if (touches.length === 3 || (currentMode === 'move' && touches.length === 1)) {
        isPanning = true;
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
      } else if (touches.length === 2) {
        isPanning = true;
        let dx = touches[0].clientX - touches[1].clientX;
        let dy = touches[0].clientY - touches[1].clientY;
        initialPinchDistance = Math.sqrt(dx*dx + dy*dy);
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
      } else if (touches.length === 1 && currentMode === 'draw') {
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);

        if (tool.type === 'bucket') {
          floodFill(pt.x, pt.y);
          return;
        }

        if (tool.type === 'circle' || tool.type === 'square') {
          previewShape = { tool: tool.type, startX: pt.x, startY: pt.y, pts: '' };
          return;
        }

        isDrawing = true;
        let newStrokeRef = push(strokesRef);
        currentStrokeId = newStrokeRef.key;
        let newStroke = {
          uid: myUid, color: tool.color, size: tool.size, opacity: tool.opacity,
          brush: tool.type, pts: `${pt.x.toFixed(1)},${pt.y.toFixed(1)}`, finished: false
        };
        localStrokes[currentStrokeId] = newStroke;
        strokeOrder.push(currentStrokeId);
        set(newStrokeRef, newStroke);
      }
    }, {passive: false});

    // Touch Move
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for(let touch of e.changedTouches) {
        activeTouches[touch.identifier] = touch;
      }
      let touches = Object.values(activeTouches);

      if (isMovingImageMode && canvasImage.element && touches.length === 1) {
        let deltaX = (touches[0].clientX - initialPanCenter.x) / camera.scale;
        let deltaY = (touches[0].clientY - initialPanCenter.y) / camera.scale;
        canvasImage.x = initialImagePos.x + deltaX;
        canvasImage.y = initialImagePos.y + deltaY;
        set(ref(db, 'sharedImage/x'), canvasImage.x);
        set(ref(db, 'sharedImage/y'), canvasImage.y);
        drawAll();
      } else if (isDrawing && touches.length === 1 && currentStrokeId) {
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);
        let stroke = localStrokes[currentStrokeId];
        stroke.pts += `;${pt.x.toFixed(1)},${pt.y.toFixed(1)}`;
        set(ref(db, `strokes/${currentStrokeId}/pts`), stroke.pts);
        drawAll();
      } else if ((tool.type === 'circle' || tool.type === 'square') && previewShape && touches.length === 1) {
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);
        if (previewShape.tool === 'circle') {
          const radius = Math.hypot(pt.x - previewShape.startX, pt.y - previewShape.startY);
          previewShape.pts = generateCirclePoints(previewShape.startX, previewShape.startY, radius);
        } else {
          previewShape.pts = generateSquarePoints(previewShape.startX, previewShape.startY, pt.x, pt.y);
        }
        drawAll();
      } else if (isPanning) {
        let currentCenter = getTouchCenter(touches);
        let deltaX = currentCenter.x - initialPanCenter.x;
        let deltaY = currentCenter.y - initialPanCenter.y;
        if (touches.length === 2 && initialPinchDistance) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          let dist = Math.sqrt(dx*dx + dy*dy);
          let scaleDiff = dist / initialPinchDistance;
          let newScale = initialCamera.scale * scaleDiff;
          let worldX = (currentCenter.x - initialCamera.x) / initialCamera.scale;
          let worldY = (currentCenter.y - initialCamera.y) / initialCamera.scale;
          camera.scale = newScale;
          camera.x = currentCenter.x - worldX * camera.scale;
          camera.y = currentCenter.y - worldY * camera.scale;
        } else {
          camera.x = initialCamera.x + deltaX;
          camera.y = initialCamera.y + deltaY;
        }
        drawAll();
      }
    }, {passive: false});

    // Touch End
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for(let touch of e.changedTouches) {
        delete activeTouches[touch.identifier];
      }
      let touches = Object.values(activeTouches);

      if (isDrawing && currentStrokeId) {
        set(ref(db, `strokes/${currentStrokeId}/finished`), true);
      }

      if (previewShape) {
        let newStrokeRef = push(strokesRef);
        let newStroke = {
          uid: myUid, color: tool.color, size: tool.size, opacity: tool.opacity,
          brush: previewShape.tool, pts: previewShape.pts, finished: true
        };
        localStrokes[newStrokeRef.key] = newStroke;
        strokeOrder.push(newStrokeRef.key);
        set(newStrokeRef, newStroke);
        previewShape = null;
        drawAll();
      }

      if (touches.length === 0) {
        isDrawing = false;
        isPanning = false;
        currentStrokeId = null;
        initialPinchDistance = null;
        initialPanCenter = null;
        initialImagePos = null;
      }
    });

    // Database listeners
    onChildAdded(strokesRef, (snapshot) => {
      let id = snapshot.key;
      if(!localStrokes[id]) {
        localStrokes[id] = snapshot.val();
        strokeOrder.push(id);
        drawAll();
      }
    });
    onChildChanged(strokesRef, (snapshot) => {
      let id = snapshot.key;
      if(localStrokes[id]) {
        localStrokes[id] = snapshot.val();
        drawAll();
      }
    });
    onChildRemoved(strokesRef, (snapshot) => {
      let id = snapshot.key;
      delete localStrokes[id];
      strokeOrder = strokeOrder.filter(sId => sId !== id);
      drawAll();
    });

    onValue(imageRef, (snapshot) => {
      const data = snapshot.val();
      if (data && data.src) {
        if (canvasImage.src !== data.src) {
          const img = new Image();
          img.onload = () => {
            canvasImage.element = img;
            canvasImage.src = data.src;
            canvasImage.x = data.x || 0;
            canvasImage.y = data.y || 0;
            canvasImage.scale = data.scale || 1;
            document.getElementById('image-scale-slider').value = canvasImage.scale;
            document.getElementById('scale-val').innerText = Math.round(canvasImage.scale * 100);
            drawAll();
          };
          img.src = data.src;
        } else {
          canvasImage.x = data.x;
          canvasImage.y = data.y;
          canvasImage.scale = data.scale;
          document.getElementById('image-scale-slider').value = data.scale;
          document.getElementById('scale-val').innerText = Math.round(data.scale * 100);
          drawAll();
        }
      }
    });

    // UI Controls
    document.getElementById('minimize-toggle').onclick = () => {
      const panel = document.getElementById('floating-panel');
      panel.classList.toggle('minimized');
    };

    document.getElementById('theme-toggle').onclick = () => {
      let current = document.documentElement.getAttribute('data-theme');
      let next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      document.getElementById('theme-toggle').innerText = next === 'light' ? '🌙' : '☀️';
    };

    document.getElementById('mode-draw').onclick = () => {
      currentMode = 'draw';
      document.getElementById('mode-draw').classList.add('active');
      document.getElementById('mode-move').classList.remove('active');
    };
    document.getElementById('mode-move').onclick = () => {
      currentMode = 'move';
      document.getElementById('mode-move').classList.add('active');
      document.getElementById('mode-draw').classList.remove('active');
    };

    document.getElementById('thickness').oninput = (e) => {
      tool.size = parseInt(e.target.value);
      document.getElementById('thick-val').innerText = tool.size;
    };

    document.getElementById('opacity').oninput = (e) => {
      tool.opacity = parseFloat(e.target.value);
      document.getElementById('opac-val').innerText = Math.round(tool.opacity * 100);
    };

    document.querySelectorAll('.brush-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool.type = btn.getAttribute('data-tool');
      };
    });

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tool.color = btn.getAttribute('data-color');
      };
    });

    document.getElementById('color-picker').oninput = (e) => {
      tool.color = e.target.value;
    };

    // Image upload and other buttons (same as before)
    document.getElementById('btn-upload-trigger').onclick = () => document.getElementById('image-uploader').click();

    document.getElementById('image-uploader').onchange = (e) => {
      let file = e.target.files[0];
      if (!file) return;
      let reader = new FileReader();
      reader.onload = (event) => {
        let img = new Image();
        img.onload = () => {
          let maxDimension = 800;
          let targetW = img.width, targetH = img.height;
          if (targetW > maxDimension || targetH > maxDimension) {
            if (targetW > targetH) { targetH = Math.round((targetH * maxDimension) / targetW); targetW = maxDimension; }
            else { targetW = Math.round((targetW * maxDimension) / targetH); targetH = maxDimension; }
          }
          let processCanvas = document.createElement('canvas');
          processCanvas.width = targetW;
          processCanvas.height = targetH;
          let processCtx = processCanvas.getContext('2d');
          processCtx.drawImage(img, 0, 0, targetW, targetH);
          let optimizedDataURL = processCanvas.toDataURL('image/jpeg', 0.75);
          let centerWorld = screenToWorld(width / 2, height / 2);
          set(imageRef, { src: optimizedDataURL, x: centerWorld.x, y: centerWorld.y, scale: 1 });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    document.getElementById('btn-remove-image').onclick = () => remove(imageRef);
    document.getElementById('image-scale-slider').oninput = (e) => {
      if (canvasImage.element) set(ref(db, 'sharedImage/scale'), parseFloat(e.target.value));
    };

    document.getElementById('btn-toggle-img-move').onclick = () => {
      if (!canvasImage.element) return alert("Please upload an image first!");
      isMovingImageMode = !isMovingImageMode;
      const btn = document.getElementById('btn-toggle-img-move');
      if (isMovingImageMode) {
        btn.innerText = "🔓 Move Image Mode: On";
        btn.classList.add('active-toggle');
      } else {
        btn.innerText = "🔒 Move Image Mode: Off";
        btn.classList.remove('active-toggle');
      }
    };

    document.getElementById('btn-recenter').onclick = () => {
      camera = { x: width / 2, y: height / 2, scale: 1 };
      drawAll();
    };

    document.getElementById('btn-toggle-nametags').onclick = () => {
      showNameTags = !showNameTags;
      document.getElementById('btn-toggle-nametags').innerText = showNameTags ? "🏷️ Tags: On" : "🏷️ Tags: Off";
      drawAll();
    };

    document.getElementById('btn-undo').onclick = async () => {
      for(let i = strokeOrder.length - 1; i >= 0; i--) {
        let id = strokeOrder[i];
        if(localStrokes[id] && localStrokes[id].uid === myUid) {
          await remove(ref(db, `strokes/${id}`));
          break;
        }
      }
    };

    document.getElementById('btn-clear').onclick = () => {
      if(confirm('Clear the canvas for everyone?')) remove(strokesRef);
    };

    document.getElementById('btn-save').onclick = () => {
      // Save logic (same as before)
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for(let id of strokeOrder) {
        let stroke = localStrokes[id];
        if(!stroke.pts) continue;
        let pts = stroke.pts.split(';');
        for(let pt of pts) {
          let [x,y] = pt.split(',').map(Number);
          if(x < minX) minX = x; if(x > maxX) maxX = x;
          if(y < minY) minY = y; if(y > maxY) maxY = y;
        }
      }
      let offCanvas = document.createElement('canvas');
      offCanvas.width = maxX - minX + 200;
      offCanvas.height = maxY - minY + 200;
      let offCtx = offCanvas.getContext('2d');
      offCtx.fillStyle = '#ffffff';
      offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
      offCtx.translate(-minX + 100, -minY + 100);
      if (canvasImage.element) {
        offCtx.save();
        offCtx.translate(canvasImage.x, canvasImage.y);
        offCtx.scale(canvasImage.scale, canvasImage.scale);
        offCtx.drawImage(canvasImage.element, -canvasImage.element.width / 2, -canvasImage.element.height / 2);
        offCtx.restore();
      }
      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(offCtx, localStrokes[id]);
      }
      let link = document.createElement('a');
      link.download = 'multidraw.png';
      link.href = offCanvas.toDataURL('image/png');
      link.click();
    };

    // Chat
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    function sendMsg() {
      let text = chatInput.value.trim();
      if(text) {
        push(chatRef, { uid: myUid, text: text, time: Date.now() });
        chatInput.value = '';
      }
    }
    document.getElementById('send-chat').onclick = sendMsg;
    chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    onChildAdded(chatRef, (snapshot) => {
      let msg = snapshot.val();
      let div = document.createElement('div');
      div.className = 'chat-msg ' + (msg.uid === myUid ? 'mine' : 'other');
      div.innerText = msg.text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Init
    resize();
    drawAll();
  </script>
</body>
</html>
