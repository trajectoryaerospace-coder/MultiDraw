<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Infinite Multi-Draw Pro</title>
  <style>
    :root {
      /* Premium Dark Glass Mode Defaults */
      --bg-panel: rgba(20, 20, 25, 0.82);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #007aff;
      --accent-hover: #3395ff;
      --chat-mine: #007aff;
      --chat-other: rgba(255, 255, 255, 0.12);
      --panel-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      --dot-green: #30d158;
      --dot-red: #ff453a;
    }
    [data-theme="light"] {
      /* Premium Light Glass Mode */
      --bg-panel: rgba(245, 245, 250, 0.88);
      --text: #1c1c1e;
      --text-muted: rgba(0, 0, 0, 0.55);
      --border: rgba(0, 0, 0, 0.08);
      --accent: #007aff;
      --accent-hover: #0056b3;
      --chat-mine: #007aff;
      --chat-other: rgba(0, 0, 0, 0.06);
      --panel-shadow: 0 20px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.4);
      --dot-green: #34c759;
      --dot-red: #ff3b30;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }
   
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      position: fixed;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    /* Cinematic 4-Second Loading Screen Overlay */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #09090b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .intro-title {
      color: #ffffff;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-align: center;
      animation: pulseGlow 2s infinite ease-in-out;
    }
    .intro-subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.98); opacity: 0.85; text-shadow: 0 0 0px rgba(0,122,255,0); }
      50% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 25px rgba(0,122,255,0.6); }
    }
    /* Landscape Mode Enforcer */
    #landscape-warning {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #09090b; color: white; z-index: 99999;
      align-items: center; justify-content: center; text-align: center;
      font-size: 1.2rem; font-weight: 500; padding: 20px;
    }
    @media (orientation: portrait) { #landscape-warning { display: flex; } }
    
    /* Premium Floating Control Hub */
    #floating-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 350px;
      background: var(--bg-panel);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      box-shadow: var(--panel-shadow);
      overflow: hidden;
      max-height: calc(100vh - 40px);
      z-index: 1000;
      transition: width 0.35s cubic-bezier(0.25, 1, 0.5, 1), height 0.35s cubic-bezier(0.25, 1, 0.5, 1), border-radius 0.35s ease;
    }
   
    /* Notification Status Alert Dot */
    #noti-dot {
      position: absolute;
      top: 13px;
      left: 48px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--dot-green);
      z-index: 1005;
      box-shadow: 0 0 8px var(--dot-green);
      transition: background-color 0.3s, box-shadow 0.3s;
      pointer-events: none;
    }
    #noti-dot.unread {
      background-color: var(--dot-red);
      box-shadow: 0 0 10px var(--dot-red);
    }
    /* Minimized Compact Mode Container */
    #floating-panel.minimized {
      width: 56px;
      height: 56px;
      border-radius: 28px;
    }
    #floating-panel.minimized .panel-content {
      display: none;
    }
    #floating-panel.minimized #drag-handle {
      border: none; background: transparent; width: 100%; height: 100%; padding: 0; justify-content: center;
    }
    #floating-panel.minimized #drag-handle .handle-bar,
    #floating-panel.minimized #drag-handle #theme-toggle {
      display: none;
    }
    #floating-panel.minimized #minimize-toggle {
      width: 100%; height: 100%; margin: 0; font-size: 11px; font-weight: bold; letter-spacing: 0.5px;
    }
    #floating-panel.minimized #noti-dot {
      top: 8px;
      left: 38px;
    }
    /* Drag Handle Frame */
    #drag-handle {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      cursor: grab;
      background: rgba(0,0,0,0.02);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #drag-handle:active { cursor: grabbing; }
    .handle-bar { width: 36px; height: 5px; background: var(--text); border-radius: 3px; opacity: 0.2; }
    .btn-icon { background: none; border: none; color: var(--text); font-size: 16px; padding: 8px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .btn-icon:hover { background: rgba(255,255,255,0.1); }
    /* Layout Panel Body */
    .panel-content { padding: 18px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; flex: 1; }
    /* Control Structuring */
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
   
    /* Modern Slider Layouts */
    input[type=range] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: var(--border); outline: none; accent-color: var(--accent);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text); cursor: pointer; border: 2px solid var(--accent);
    }
    /* Mode Navigation Segments */
    .mode-segment {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.08);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .segment-btn {
      padding: 8px; background: none; border: none; color: var(--text); font-weight: 600; font-size: 0.85rem; border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s, color 0.2s;
    }
    .segment-btn.active {
      background: var(--text); color: var(--bg-panel);
    }
   
    /* Grid Layout Frameworks */
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
   
    .brush-btn {
      padding: 10px 0; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .brush-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .color-btn { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
    .color-btn.active { border-color: var(--text); transform: scale(1.1); box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    #color-picker { width: 100%; aspect-ratio: 1; border: none; border-radius: 50%; cursor: pointer; padding: 0; background: none; }
   
    /* Custom Media/Image Section styling */
    .image-control-box {
      background: rgba(0,0,0,0.04); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    /* Interface Utility Action Grid */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .action-btn {
      padding: 11px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.8rem; cursor: pointer;
      background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); transition: background 0.2s, color 0.2s;
    }
    .action-btn:active { background: rgba(255,255,255,0.15); }
    .action-btn.danger { background: rgba(255, 59, 48, 0.15); color: #ff453a; border-color: rgba(255, 59, 48, 0.2); }
    .action-btn.danger:active { background: rgba(255, 59, 48, 0.3); }
    .action-btn.active-toggle { background: #ff9500; color: white; border-color: #ff9500; }
    
    /* Live Synchronized Chat - Positioned Highlighted at Top */
    #chat-wrapper {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      background: rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #chat-box {
      min-height: 100px; max-height: 140px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
    }
    .chat-msg { padding: 7px 12px; border-radius: 14px; font-size: 0.8rem; max-width: 85%; word-wrap: break-word; line-height: 1.3; }
    .chat-msg.mine { align-self: flex-end; background: var(--chat-mine); color: white; border-bottom-right-radius: 2px; }
    .chat-msg.other { align-self: flex-start; background: var(--chat-other); color: var(--text); border-bottom-left-radius: 2px; }
   
    .chat-input-row { display: flex; gap: 6px; }
    #chat-input {
      flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.06); color: var(--text); outline: none; font-size: 0.85rem;
    }
    #send-chat { padding: 0 16px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    #send-chat:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="intro-title">Multidraw Pro</div>
    <div class="intro-subtitle">For amazingngn Zann</div>
  </div>
  <div id="landscape-warning">Please rotate your device to Landscape Mode.</div>
 
  <canvas id="canvas"></canvas>
  
  <div id="floating-panel">
    <div id="noti-dot"></div>
    <div id="drag-handle">
      <button id="theme-toggle" class="btn-icon">☀️</button>
      <div class="handle-bar"></div>
      <button id="minimize-toggle" class="btn-icon">🔽</button>
    </div>
   
    <div class="panel-content">
      <div class="control-group">
        <label>Live Synchronized Chat</label>
        <div id="chat-wrapper">
          <div id="chat-box"></div>
          <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-chat">Send</button>
          </div>
        </div>
      </div>

      <div class="mode-segment">
        <button class="segment-btn active" id="mode-draw">✏️ Draw</button>
        <button class="segment-btn" id="mode-move">🖐️ Workspace</button>
      </div>

      <div class="control-group">
        <label>Brushes & Geometric Shapes</label>
        <div class="grid-4">
          <button class="brush-btn active" data-brush="solid"><span>Solid</span></button>
          <button class="brush-btn" data-brush="marker"><span>Marker</span></button>
          <button class="brush-btn" data-brush="soft"><span>Soft</span></button>
          <button class="brush-btn" data-brush="neon"><span>Neon</span></button>
          <button class="brush-btn" data-brush="bucket"><span>🪣 Bucket</span></button>
          <button class="brush-btn" data-brush="circle"><span>⚪ Circle</span></button>
          <button class="brush-btn" data-brush="square"><span>⬜ Square</span></button>
          <button class="brush-btn" data-brush="eraser"><span>Eraser</span></button>
        </div>
      </div>

      <div class="control-group">
        <label>Thickness: <span id="thick-val">10</span>px</label>
        <input type="range" id="thickness" min="1" max="178" value="10">
      </div>

      <div class="control-group" id="opacity-container">
        <label>Opacity: <span id="opac-val">100</span>%</label>
        <input type="range" id="opacity" min="0.01" max="1" step="0.01" value="1">
      </div>

      <div class="control-group" id="color-container">
        <label>Colors</label>
        <div class="grid-5" id="colors">
          <div class="color-btn active" style="background:#000000" data-color="#000000"></div>
          <div class="color-btn" style="background:#ff3b30" data-color="#ff3b30"></div>
          <div class="color-btn" style="background:#ff9500" data-color="#ff9500"></div>
          <div class="color-btn" style="background:#ffcc00" data-color="#ffcc00"></div>
          <div class="color-btn" style="background:#4cd964" data-color="#4cd964"></div>
          <div class="color-btn" style="background:#5ac8fa" data-color="#5ac8fa"></div>
          <div class="color-btn" style="background:#007aff" data-color="#007aff"></div>
          <div class="color-btn" style="background:#5856d6" data-color="#5856d6"></div>
          <div class="color-btn" style="background:#ffffff; border: 1px solid var(--border);" data-color="#ffffff"></div>
          <input type="color" id="color-picker" value="#ff00ff">
        </div>
      </div>

      <div class="control-group">
        <label>Canvas Image Engine</label>
        <div class="image-control-box">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
            <button class="action-btn" id="btn-upload-trigger">📷 Add Image</button>
            <button class="action-btn danger" id="btn-remove-image">🗑️ Remove Image</button>
          </div>
          <input type="file" id="image-uploader" accept="image/*" style="display: none;">
         
          <div class="control-group">
            <label>Image Scale: <span id="scale-val">100</span>%</label>
            <input type="range" id="image-scale-slider" min="0" max="3" step="0.02" value="1">
          </div>
         
          <button class="action-btn" id="btn-toggle-img-move">🔒 Move Image Mode: Off</button>
        </div>
      </div>

      <div class="action-grid">
        <button class="action-btn" id="btn-recenter">Re-center</button>
        <button class="action-btn" id="btn-undo">Undo Last</button>
        <button class="action-btn" id="btn-toggle-nametags">🏷️ Tags: On</button>
        <button class="action-btn" id="btn-save">Save Image</button>
        <button class="action-btn danger" id="btn-clear" style="grid-column: span 2;">Clear All Canvas</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, remove, set, onChildRemoved, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDM1jZYl7qQzYdeD6oJIljyFBHALmq8p3c",
      authDomain: "multidrawing-bab47.firebaseapp.com",
      databaseURL: "https://multidrawing-bab47-default-rtdb.firebaseio.com",
      projectId: "multidrawing-bab47",
      storageBucket: "multidrawing-bab47.firebasestorage.app",
      messagingSenderId: "13446580110",
      appId: "1:13446580110:web:54fa80be0018aed00546df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const strokesRef = ref(db, 'strokes');
    const chatRef = ref(db, 'chat');
    const imageRef = ref(db, 'sharedImage');
    const myUid = 'user_' + Math.random().toString(36).substr(2, 9);

    // Initial Screen Load Intro Animation Handler
    setTimeout(() => {
      const introScreen = document.getElementById('loading-screen');
      if(introScreen) {
        introScreen.style.opacity = '0';
        setTimeout(() => introScreen.remove(), 600);
      }
    }, 4000);

    // Canvas Element Context Initializations
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let width = window.innerWidth;
    let height = window.innerHeight;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      drawAll();
    }
    window.addEventListener('resize', resize);

    // Camera Vectors & Interface States
    let camera = { x: 0, y: 0, scale: 1 };
    let currentMode = 'draw';
    let isMovingImageMode = false;
    let showNameTags = true;
    let tool = { color: '#000000', size: 10, opacity: 1, brush: 'solid' };
   
    let isDrawing = false;
    let isPanning = false;
    let currentStrokeId = null;
    let localStrokes = {};
    let strokeOrder = [];
    
    // Geometric shape preview tracking vectors
    let shapeStartPoint = null;
    let shapePreviewPoint = null;

    // Dynamic Database Image Sync Object Definition
    let canvasImage = {
      element: null,
      src: null,
      x: 0,
      y: 0,
      scale: 1
    };

    // Multi-touch Tracking Elements
    let initialPinchDistance = null;
    let initialCamera = null;
    let initialImagePos = null;
    let activeTouches = {};
    let initialPanCenter = null;

    function resetCamera() {
      camera = { x: window.innerWidth / 2, y: window.innerHeight / 2, scale: 1 };
      drawAll();
    }

    // Precise touch tracking mapping with bounding alignment coordinates mapping to resolve offset bugs on iOS Chrome
    function screenToWorld(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const canvasX = clientX - rect.left;
      const canvasY = clientY - rect.top;
      return { 
        x: (canvasX - camera.x) / camera.scale, 
        y: (canvasY - camera.y) / camera.scale 
      };
    }

    function getTouchCenter(touches) {
      const rect = canvas.getBoundingClientRect();
      let sumX = 0, sumY = 0;
      touches.forEach(t => { 
        sumX += (t.clientX - rect.left); 
        sumY += (t.clientY - rect.top); 
      });
      return { x: sumX / touches.length, y: sumY / touches.length };
    }

    // Engine Core Vector Brush Styling Architectures
    function applyBrushStyles(ctxToUse, brushType, color, size, opacity) {
      ctxToUse.lineCap = 'round';
      ctxToUse.lineJoin = 'round';
      ctxToUse.lineWidth = size;
      ctxToUse.globalCompositeOperation = 'source-over';
      ctxToUse.shadowBlur = 0;
      ctxToUse.shadowColor = 'transparent';
      
      if (brushType === 'eraser') {
        ctxToUse.strokeStyle = '#ffffff';
        ctxToUse.fillStyle = '#ffffff';
        return;
      }
      
      let r = 0, g = 0, b = 0;
      if(color.startsWith('#')) {
        r = parseInt(color.slice(1,3), 16);
        g = parseInt(color.slice(3,5), 16);
        b = parseInt(color.slice(5,7), 16);
      } else if (color.startsWith('rgb')) {
        const matches = color.match(/\d+/g);
        if(matches) { r = parseInt(matches[0]); g = parseInt(matches[1]); b = parseInt(matches[2]); }
      }
     
      ctxToUse.strokeStyle = `rgba(${r},${g},${b},${opacity})`;
      ctxToUse.fillStyle = `rgba(${r},${g},${b},${opacity})`;
      
      if(brushType === 'soft') {
        ctxToUse.shadowBlur = size;
        ctxToUse.shadowColor = color;
      } else if (brushType === 'neon') {
        ctxToUse.shadowBlur = size * 1.4;
        ctxToUse.shadowColor = color;
        ctxToUse.strokeStyle = `rgba(255,255,255,${opacity})`;
      } else if (brushType === 'marker') {
        ctxToUse.globalCompositeOperation = 'multiply';
      }
    }

    function renderStroke(ctxToUse, stroke) {
      if(!stroke.pts || stroke.pts.length === 0) return;
      ctxToUse.save();
      applyBrushStyles(ctxToUse, stroke.brush, stroke.color, stroke.size, stroke.opacity);
     
      if (stroke.brush === 'circle' || stroke.brush === 'square') {
        let coords = stroke.pts.split(';');
        if(coords.length >= 2) {
          let start = coords[0].split(',').map(Number);
          let end = coords[1].split(',').map(Number);
          ctxToUse.beginPath();
          if(stroke.brush === 'circle') {
            let radius = Math.sqrt(Math.pow(end[0] - start[0], 2) + Math.pow(end[1] - start[1], 2));
            ctxToUse.arc(start[0], start[1], radius, 0, 2 * Math.PI);
          } else {
            ctxToUse.rect(start[0], start[1], end[0] - start[0], end[1] - start[1]);
          }
          ctxToUse.stroke();
        }
      } else if (stroke.brush === 'bucket') {
        // Bucket shapes rendered as filled polygon segments
        ctxToUse.beginPath();
        let pts = stroke.pts.split(';');
        for(let i=0; i<pts.length; i++) {
          let coords = pts[i].split(',');
          if(coords.length < 2) continue;
          let px = parseFloat(coords[0]);
          let py = parseFloat(coords[1]);
          if(i===0) ctxToUse.moveTo(px, py);
          else ctxToUse.lineTo(px, py);
        }
        ctxToUse.closePath();
        ctxToUse.fill();
        ctxToUse.stroke();
      } else {
        ctxToUse.beginPath();
        let pts = stroke.pts.split(';');
        for(let i=0; i<pts.length; i++) {
          let coords = pts[i].split(',');
          if(coords.length < 2) continue;
          let px = parseFloat(coords[0]);
          let py = parseFloat(coords[1]);
          if(i===0) ctxToUse.moveTo(px, py);
          else ctxToUse.lineTo(px, py);
        }
        ctxToUse.stroke();
      }
      ctxToUse.restore();
    }

    function drawAll() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.save();
      ctx.translate(camera.x, camera.y);
      ctx.scale(camera.scale, camera.scale);
      
      // Render shared image inside World Coordinate system if active in cloud DB
      if (canvasImage.element) {
        ctx.save();
        ctx.translate(canvasImage.x, canvasImage.y);
        ctx.scale(canvasImage.scale, canvasImage.scale);
        try {
          ctx.drawImage(canvasImage.element, -canvasImage.element.width / 2, -canvasImage.element.height / 2);
        } catch(e) {}
        ctx.restore();
      }
      
      // Loop over and draw active database vector paths
      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(ctx, localStrokes[id]);
      }
      
      // Vector perfect rendering of local active geometric creation overlays
      if((tool.brush === 'circle' || tool.brush === 'square') && isDrawing && shapeStartPoint && shapePreviewPoint) {
        ctx.save();
        applyBrushStyles(ctx, tool.brush, tool.color, tool.size, tool.opacity);
        ctx.beginPath();
        if(tool.brush === 'circle') {
          let radius = Math.sqrt(Math.pow(shapePreviewPoint.x - shapeStartPoint.x, 2) + Math.pow(shapePreviewPoint.y - shapeStartPoint.y, 2));
          ctx.arc(shapeStartPoint.x, shapeStartPoint.y, radius, 0, 2 * Math.PI);
        } else {
          ctx.rect(shapeStartPoint.x, shapeStartPoint.y, shapePreviewPoint.x - shapeStartPoint.x, shapePreviewPoint.y - shapeStartPoint.y);
        }
        ctx.stroke();
        ctx.restore();
      }

      // Dynamic "lover" target cursor text tag rendering layer
      if (showNameTags) {
        for(let id of strokeOrder) {
          let currentStroke = localStrokes[id];
          if(currentStroke && currentStroke.uid !== myUid && currentStroke.pts && !currentStroke.finished) {
            let ptsArr = currentStroke.pts.split(';');
            let lastPtStr = ptsArr[ptsArr.length - 1];
            if(lastPtStr) {
              let [lx, ly] = lastPtStr.split(',').map(Number);
              if(!isNaN(lx) && !isNaN(ly)) {
                ctx.save();
                ctx.font = 'bold ' + Math.max(12, 14 / camera.scale) + 'px sans-serif';
                let textMetric = ctx.measureText("lover");
               
                let paddingW = 8 / camera.scale;
                let paddingH = 5 / camera.scale;
                let fontSize = Math.max(12, 14 / camera.scale);
               
                let tx = lx + (14 / camera.scale);
                let ty = ly - (12 / camera.scale);
                let rectW = textMetric.width + (paddingW * 2);
                let rectH = fontSize + (paddingH * 2);
               
                ctx.fillStyle = 'rgba(65, 8, 8, 0.72)';
                ctx.beginPath();
                if (typeof ctx.roundRect === 'function') {
                  ctx.roundRect(tx, ty - fontSize, rectW, rectH, 8 / camera.scale);
                } else {
                  ctx.rect(tx, ty - fontSize, rectW, rectH);
                }
                ctx.fill();
               
                ctx.fillStyle = '#ffffff';
                ctx.fillText("lover", tx + paddingW, ty + (fontSize * 0.08));
                ctx.restore();
              }
            }
          }
        }
      }
      ctx.restore();
    }

    // Comprehensive Hex Color-To-RGBA Array Conversion Routine
    function getRGBAColors(hexColor, alpha) {
      let r = 0, g = 0, b = 0;
      if (hexColor.startsWith('#')) {
        r = parseInt(hexColor.slice(1, 3), 16);
        g = parseInt(hexColor.slice(3, 5), 16);
        b = parseInt(hexColor.slice(5, 7), 16);
      }
      return [r, g, b, Math.floor(alpha * 255)];
    }

    // Full Localized Multi-Point Boundary Polygon Estimation Bucket Fill Engine
    function executeBucketVectorFill(worldStartPt) {
      const sampleWidth = Math.min(width, 800);
      const sampleHeight = Math.min(height, 600);
      
      const bufferCanvas = document.createElement('canvas');
      bufferCanvas.width = sampleWidth;
      bufferCanvas.height = sampleHeight;
      const bCtx = bufferCanvas.getContext('2d', { alpha: false });
      
      bCtx.fillStyle = '#ffffff';
      bCtx.fillRect(0, 0, sampleWidth, sampleHeight);
      
      bCtx.save();
      // Center buffer around the user's bucket tap target coordinate structure
      bCtx.translate(sampleWidth / 2, sampleHeight / 2);
      bCtx.scale(camera.scale, camera.scale);
      bCtx.translate(-worldStartPt.x, -worldStartPt.y);
      
      if (canvasImage.element) {
        bCtx.save();
        bCtx.translate(canvasImage.x, canvasImage.y);
        bCtx.scale(canvasImage.scale, canvasImage.scale);
        bCtx.drawImage(canvasImage.element, -canvasImage.element.width / 2, -canvasImage.element.height / 2);
        bCtx.restore();
      }
      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(bCtx, localStrokes[id]);
      }
      bCtx.restore();
      
      const imgData = bCtx.getImageData(0, 0, sampleWidth, sampleHeight);
      const pixels = imgData.data;
      
      const startX = Math.floor(sampleWidth / 2);
      const startY = Math.floor(sampleHeight / 2);
      
      const targetIdx = (startY * sampleWidth + startX) * 4;
      const targetR = pixels[targetIdx];
      const targetG = pixels[targetIdx + 1];
      const targetB = pixels[targetIdx + 2];
      
      const fillRGBA = getRGBAColors(tool.color, tool.opacity);
      if (Math.abs(targetR - fillRGBA[0]) < 10 && Math.abs(targetG - fillRGBA[1]) < 10 && Math.abs(targetB - fillRGBA[2]) < 10) {
        return;
      }
      
      const boundaryPts = [];
      const visited = new Uint8Array(sampleWidth * sampleHeight);
      const queue = [[startX, startY]];
      visited[startY * sampleWidth + startX] = 1;
      
      const directions = [[0, -1], [1, 0], [0, 1], [-1, 0]];
      let iterations = 0;
      const maxIterations = 45000; 

      while(queue.length > 0 && iterations++ < maxIterations) {
        const [cx, cy] = queue.shift();
        let isBoundary = false;
        
        for(let i=0; i<4; i++) {
          const nx = cx + directions[i][0];
          const ny = cy + directions[i][1];
          
          if(nx >= 0 && nx < sampleWidth && ny >= 0 && ny < sampleHeight) {
            const nIdx = (ny * sampleWidth + nx) * 4;
            const nr = pixels[nIdx];
            const ng = pixels[nIdx+1];
            const nb = pixels[nIdx+2];
            
            const matchesTarget = Math.abs(nr - targetR) < 32 && Math.abs(ng - targetG) < 32 && Math.abs(nb - targetB) < 32;
            
            if(!matchesTarget) {
              isBoundary = true;
            } else if(visited[ny * sampleWidth + nx] === 0) {
              visited[ny * sampleWidth + nx] = 1;
              queue.push([nx, ny]);
            }
          } else {
            isBoundary = true;
          }
        }
        
        if (isBoundary && (cx % 3 === 0 || cy % 3 === 0)) {
          boundaryPts.push([cx, cy]);
        }
      }
      
      if(boundaryPts.length < 3) return;
      
      // Sort boundary layout segments radially to resolve convex vector shape coordinates
      boundaryPts.sort((a, b) => {
        return Math.atan2(a[1] - startY, a[0] - startX) - Math.atan2(b[1] - startY, b[0] - startX);
      });
      
      const strokePoints = boundaryPts.map(pt => {
        const wx = worldStartPt.x + (pt[0] - sampleWidth / 2) / camera.scale;
        const wy = worldStartPt.y + (pt[1] - sampleHeight / 2) / camera.scale;
        return `${wx.toFixed(1)},${wy.toFixed(1)}`;
      }).join(';');
      
      const newStrokeRef = push(strokesRef);
      set(newStrokeRef, {
        uid: myUid,
        color: tool.color,
        size: 1,
        opacity: tool.opacity,
        brush: 'bucket',
        pts: strokePoints,
        finished: true
      });
    }

    // Touch Interaction Logic Controller Layers
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      for(let i=0; i<e.changedTouches.length; i++) {
        activeTouches[e.changedTouches[i].identifier] = e.changedTouches[i];
      }
      let touches = Object.values(activeTouches);
      
      // Condition 1: Move Image override state
      if (isMovingImageMode && canvasImage.element && touches.length === 1) {
        isDrawing = false;
        isPanning = false;
        initialPanCenter = { x: touches[0].clientX - rect.left, y: touches[0].clientY - rect.top };
        initialImagePos = { x: canvasImage.x, y: canvasImage.y };
      }
      // Condition 2: Explicit Move mode or 3 finger pan
      else if (touches.length === 3 || (currentMode === 'move' && touches.length === 1)) {
        isDrawing = false;
        isPanning = true;
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
      }
      // Condition 3: Multi-touch zoom/pinches
      else if (touches.length === 2) {
        isDrawing = false;
        isPanning = true;
        let t1x = touches[0].clientX - rect.left;
        let t1y = touches[0].clientY - rect.top;
        let t2x = touches[1].clientX - rect.left;
        let t2y = touches[1].clientY - rect.top;
        let dx = t1x - t2x;
        let dy = t1y - t2y;
        initialPinchDistance = Math.sqrt(dx*dx + dy*dy);
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
      }
      // Condition 4: Basic Write/Draw Operations
      else if (touches.length === 1 && currentMode === 'draw') {
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);
        
        if (tool.brush === 'bucket') {
          executeBucketVectorFill(pt);
          return;
        }
        
        isDrawing = true;
        isPanning = false;
        
        if(tool.brush === 'circle' || tool.brush === 'square') {
          shapeStartPoint = pt;
          shapePreviewPoint = pt;
        } else {
          let newStrokeRef = push(strokesRef);
          currentStrokeId = newStrokeRef.key;
         
          let newStroke = {
            uid: myUid, color: tool.color, size: tool.size, opacity: tool.opacity, brush: tool.brush, pts: `${pt.x.toFixed(1)},${pt.y.toFixed(1)}`, finished: false
          };
         
          localStrokes[currentStrokeId] = newStroke;
          strokeOrder.push(currentStrokeId);
          set(newStrokeRef, newStroke);
        }
      }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      for(let i=0; i<e.changedTouches.length; i++) {
        if(activeTouches[e.changedTouches[i].identifier]) {
          activeTouches[e.changedTouches[i].identifier] = e.changedTouches[i];
        }
      }
      let touches = Object.values(activeTouches);
      
      // Handler 1: Move global position values of image synced live across network
      if (isMovingImageMode && canvasImage.element && initialImagePos && touches.length === 1) {
        let clientX = touches[0].clientX - rect.left;
        let clientY = touches[0].clientY - rect.top;
        let deltaX = (clientX - initialPanCenter.x) / camera.scale;
        let deltaY = (clientY - initialPanCenter.y) / camera.scale;
        canvasImage.x = initialImagePos.x + deltaX;
        canvasImage.y = initialImagePos.y + deltaY;
        drawAll();
       
        set(ref(db, 'sharedImage/x'), canvasImage.x);
        set(ref(db, 'sharedImage/y'), canvasImage.y);
      }
      // Handler 2: Drag/Draw operational line coordinate vectors or shape previews
      else if (isDrawing && touches.length === 1) {
        let pt = screenToWorld(touches[0].clientX, touches[0].clientY);
        if((tool.brush === 'circle' || tool.brush === 'square') && shapeStartPoint) {
          shapePreviewPoint = pt;
          drawAll();
        } else if (currentStrokeId && localStrokes[currentStrokeId]) {
          let stroke = localStrokes[currentStrokeId];
          stroke.pts += `;${pt.x.toFixed(1)},${pt.y.toFixed(1)}`;
         
          set(ref(db, `strokes/${currentStrokeId}/pts`), stroke.pts);
          drawAll();
        }
      }
      // Handler 3: Shift camera operations viewport metrics
      else if (isPanning && initialPanCenter) {
        let currentCenter = getTouchCenter(touches);
        let deltaX = currentCenter.x - initialPanCenter.x;
        let deltaY = currentCenter.y - initialPanCenter.y;
        
        if (touches.length === 2 && initialPinchDistance) {
          let t1x = touches[0].clientX - rect.left;
          let t1y = touches[0].clientY - rect.top;
          let t2x = touches[1].clientX - rect.left;
          let t2y = touches[1].clientY - rect.top;
          let dx = t1x - t2x;
          let dy = t1y - t2y;
          let dist = Math.sqrt(dx*dx + dy*dy);
         
          let scaleDiff = dist / initialPinchDistance;
          let newScale = initialCamera.scale * scaleDiff;
          let worldX = (currentCenter.x - initialCamera.x) / initialCamera.scale;
          let worldY = (currentCenter.y - initialCamera.y) / initialCamera.scale;
          camera.scale = newScale;
          camera.x = currentCenter.x - worldX * camera.scale;
          camera.y = currentCenter.y - worldY * camera.scale;
        } else {
          camera.x = initialCamera.x + deltaX;
          camera.y = initialCamera.y + deltaY;
        }
        drawAll();
      }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      for(let i=0; i<e.changedTouches.length; i++) {
        delete activeTouches[e.changedTouches[i].identifier];
      }
      let touches = Object.values(activeTouches);
     
      if (isDrawing) {
        if((tool.brush === 'circle' || tool.brush === 'square') && shapeStartPoint && shapePreviewPoint) {
          let newStrokeRef = push(strokesRef);
          let shapePointsStr = `${shapeStartPoint.x.toFixed(1)},${shapeStartPoint.y.toFixed(1)};${shapePreviewPoint.x.toFixed(1)},${shapePreviewPoint.y.toFixed(1)}`;
          set(newStrokeRef, {
            uid: myUid,
            color: tool.color,
            size: tool.size,
            opacity: tool.opacity,
            brush: tool.brush,
            pts: shapePointsStr,
            finished: true
          });
        } else if (currentStrokeId) {
          set(ref(db, `strokes/${currentStrokeId}/finished`), true);
        }
      }
      
      if (touches.length === 0) {
        isDrawing = false;
        isPanning = false;
        currentStrokeId = null;
        initialPinchDistance = null;
        initialPanCenter = null;
        initialImagePos = null;
        shapeStartPoint = null;
        shapePreviewPoint = null;
      } else {
        initialPanCenter = getTouchCenter(touches);
        initialCamera = { ...camera };
        if (touches.length !== 2) initialPinchDistance = null;
      }
      drawAll();
    });

    canvas.addEventListener('touchcancel', (e) => {
      if (isDrawing && currentStrokeId) {
        set(ref(db, `strokes/${currentStrokeId}/finished`), true);
      }
      activeTouches = {};
      isDrawing = false;
      isPanning = false;
      currentStrokeId = null;
      shapeStartPoint = null;
      shapePreviewPoint = null;
      drawAll();
    });

    // Cloud Database Synchronizations & Direct Pipeline Receivers
    onChildAdded(strokesRef, (snapshot) => {
      let id = snapshot.key;
      if(!localStrokes[id]) {
        localStrokes[id] = snapshot.val();
        strokeOrder.push(id);
        drawAll();
      }
    });

    onChildChanged(strokesRef, (snapshot) => {
      let id = snapshot.key;
      if(localStrokes[id]) {
        let data = snapshot.val();
        localStrokes[id].pts = data.pts;
        localStrokes[id].finished = data.finished;
        drawAll();
      }
    });

    onChildRemoved(strokesRef, (snapshot) => {
      let id = snapshot.key;
      delete localStrokes[id];
      strokeOrder = strokeOrder.filter(sId => sId !== id);
      drawAll();
    });

    onValue(ref(db, 'strokes'), (snap) => {
      if(!snap.exists()) {
        localStrokes = {};
        strokeOrder = [];
        drawAll();
      }
    });

    // Bidirectional Shared Image Database Sync Core Engine
    onValue(imageRef, (snapshot) => {
      const data = snapshot.val();
      if (data && data.src) {
        if (canvasImage.src !== data.src) {
          const img = new Image();
          img.onload = () => {
            canvasImage.element = img;
            canvasImage.src = data.src;
            canvasImage.x = data.x;
            canvasImage.y = data.y;
            canvasImage.scale = data.scale;
           
            document.getElementById('image-scale-slider').value = data.scale;
            document.getElementById('scale-val').innerText = Math.round(data.scale * 100);
            drawAll();
          };
          img.src = data.src;
        } else {
          canvasImage.x = data.x;
          canvasImage.y = data.y;
          canvasImage.scale = data.scale;
          document.getElementById('image-scale-slider').value = data.scale;
          document.getElementById('scale-val').innerText = Math.round(data.scale * 100);
          drawAll();
        }
      } else {
        canvasImage.element = null;
        canvasImage.src = null;
        drawAll();
      }
    });

    // ==== INTERFACE OPERATIONAL ENGINE AND UX SETS ====
    // Panel Draggable Module Setup
    const panel = document.getElementById('floating-panel');
    const handle = document.getElementById('drag-handle');
    let isDraggingPanel = false, panelOffsetX, panelOffsetY;

    handle.addEventListener('touchstart', (e) => {
      if(e.target.closest('button')) return;
      isDraggingPanel = true;
      let touch = e.touches[0];
      let rect = panel.getBoundingClientRect();
      panelOffsetX = touch.clientX - rect.left;
      panelOffsetY = touch.clientY - rect.top;
    });
   
    window.addEventListener('touchmove', (e) => {
      if(isDraggingPanel) {
        let touch = e.touches[0];
        let x = touch.clientX - panelOffsetX;
        let y = touch.clientY - panelOffsetY;
        x = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, x));
        y = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, y));
        panel.style.left = x + 'px';
        panel.style.top = y + 'px';
      }
    }, { passive: true });

    window.addEventListener('touchend', () => isDraggingPanel = false);

    // Minimize Configuration UI state mappings
    const notiDot = document.getElementById('noti-dot');
    document.getElementById('minimize-toggle').onclick = () => {
      panel.classList.toggle('minimized');
      if(panel.classList.contains('minimized')) {
        document.getElementById('minimize-toggle').innerHTML = `<span style="font-size:10px;">MENU</span>`;
      } else {
        document.getElementById('minimize-toggle').innerText = '🔽';
        if(notiDot) notiDot.classList.remove('unread');
      }
    };

    // Color theme layouts toggles
    document.getElementById('theme-toggle').onclick = () => {
      let current = document.documentElement.getAttribute('data-theme');
      let next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      document.getElementById('theme-toggle').innerText = next === 'light' ? '🌙' : '☀️';
    };

    // Global Interactive Segment State Mappings
    const modeDrawBtn = document.getElementById('mode-draw');
    const modeMoveBtn = document.getElementById('mode-move');
   
    modeDrawBtn.onclick = () => {
      currentMode = 'draw';
      modeDrawBtn.classList.add('active');
      modeMoveBtn.classList.remove('active');
    };
    modeMoveBtn.onclick = () => {

    // Size Meter Triggers

    // Brush Selection Logic Pipeline
    document.querySelectorAll('.brush-btn').forEach(btn => {

        btn.classList.add('active');

        } else {
          document.getElementById('color-container').style.opacity = '1';
          document.getElementById('color-container').style.pointerEvents = 'auto';
          document.getElementById('opacity-container').style.opacity = '1';
          document.getElementById('opacity-container').style.pointerEvents = 'auto';
        }
      };
    });

    // Custom Color Managers
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.onclick = () => {

        tool.color = btn.getAttribute('data-color');

    document.getElementById('color-picker').oninput = (e) => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      tool.color = e.target.value;

    // ==== CANVAS GLOBAL IMAGE ENGINE CONTROLLERS ====
    const imageUploader = document.getElementById('image-uploader');
    const imgScaleSlider = document.getElementById('image-scale-slider');
    const toggleImgMoveBtn = document.getElementById('btn-toggle-img-move');
    
    document.getElementById('btn-upload-trigger').onclick = () => imageUploader.click();
    imageUploader.onchange = (e) => {
      let file = e.target.files[0];
      if (!file) return;
      let reader = new FileReader();
      reader.onload = (event) => {
        let img = new Image();
        img.onload = () => {
          let maxDimension = 800;
          let targetW = img.width;
          let targetH = img.height;
          if (targetW > maxDimension || targetH > maxDimension) {
            if (targetW > targetH) { targetH = Math.round((targetH * maxDimension) / targetW); targetW = maxDimension; }
            else { targetW = Math.round((targetW * maxDimension) / targetH); targetH = maxDimension; }
          }
         
          let processCanvas = document.createElement('canvas');
          processCanvas.width = targetW;
          processCanvas.height = targetH;
          let processCtx = processCanvas.getContext('2d');
          processCtx.drawImage(img, 0, 0, targetW, targetH);

    document.getElementById('btn-remove-image').onclick = () => {

    // ==== ADVANCED SYSTEM OPERATION FUNCTIONS ====
    document.getElementById('btn-recenter').onclick = resetCamera;
   
    const toggleTagsBtn = document.getElementById('btn-toggle-nametags');
    toggleTagsBtn.onclick = () => {

        toggleTagsBtn.classList.add('danger');

    document.getElementById('btn-undo').onclick = async () => {
      for(let i = strokeOrder.length - 1; i >= 0; i--) {
        let id = strokeOrder[i];
        if(localStrokes[id] && localStrokes[id].uid === myUid) {
          await remove(ref(db, `strokes/${id}`));

    document.getElementById('btn-clear').onclick = () => {
      if(confirm('Clear the canvas landscape for everyone?')) {
        remove(strokesRef);

    };

    document.getElementById('btn-save').onclick = () => {
      if(strokeOrder.length === 0 && !canvasImage.element) return alert('Canvas workspace is empty!');
     
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
     
      for(let id of strokeOrder) {
        let stroke = localStrokes[id];
        if(!stroke.pts) continue;
        let pts = stroke.pts.split(';');
        for(let pt of pts) {
          let [x,y] = pt.split(',').map(Number);
          if(x < minX) minX = x; if(x > maxX) maxX = x;
          if(y < minY) minY = y; if(y > maxY) maxY = y;
        }
      }
      if (canvasImage.element) {
        let halfW = (canvasImage.element.width * canvasImage.scale) / 2;
        let halfH = (canvasImage.element.height * canvasImage.scale) / 2;
        if (canvasImage.x - halfW < minX) minX = canvasImage.x - halfW;
        if (canvasImage.x + halfW > maxX) maxX = canvasImage.x + halfW;
        if (canvasImage.y - halfH < minY) minY = canvasImage.y - halfH;
        if (canvasImage.y + halfH > maxY) maxY = canvasImage.y + halfH;
      }
      let pad = 80;
      minX -= pad; minY -= pad; maxX += pad; maxY += pad;
     
      let offCanvas = document.createElement('canvas');
      offCanvas.width = maxX - minX;
      offCanvas.height = maxY - minY;
      let offCtx = offCanvas.getContext('2d');
      offCtx.fillStyle = '#ffffff';
      offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
      offCtx.translate(-minX, -minY);
     
      if (canvasImage.element) {
        offCtx.save();
        offCtx.translate(canvasImage.x, canvasImage.y);
        offCtx.scale(canvasImage.scale, canvasImage.scale);
        offCtx.drawImage(canvasImage.element, -canvasImage.element.width / 2, -canvasImage.element.height / 2);
        offCtx.restore();
      }
      for(let id of strokeOrder) {
        if(localStrokes[id]) renderStroke(offCtx, localStrokes[id]);
      }
      let link = document.createElement('a');
      link.download = 'shared-infinite-canvas.png';
      link.href = offCanvas.toDataURL('image/png');
      link.click();
    };

    // Chat Interface Logic Core Engines
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
   
    function sendMsg() {
      let text = chatInput.value.trim();
      if(text) {
        push(chatRef, { uid: myUid, text: text, time: Date.now() });
        chatInput.value = '';
      }
    }
    document.getElementById('send-chat').onclick = sendMsg;
    chatInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    onChildAdded(chatRef, (snapshot) => {
      let msg = snapshot.val();
      let div = document.createElement('div');
      div.className = 'chat-msg ' + (msg.uid === myUid ? 'mine' : 'other');
      div.innerText = msg.text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      if(msg.uid !== myUid && (panel.classList.contains('minimized'))) {
        if(notiDot) notiDot.classList.add('unread');
      }
    });

    chatInput.onfocus = () => {
      if(notiDot) notiDot.classList.remove('unread');
    };

    // Runtime Initialization Injections
    resize();
    resetCamera();
  </script>
</body>
</html>
